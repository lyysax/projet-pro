<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MuseStat</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <div class="page">

      <header class="header">
        <span class="logo">MuseStat</span>
      </header>

      <main class="main">

        <!-- ÉTAPE 1 : choix de la plateforme -->
        <div id="step-platform">

          <h1 class="title">Tes statistiques musicales,<br>en temps réel.</h1>
          <p class="subtitle">Connecte-toi à ta plateforme de streaming pour commencer.</p>

          <div class="connect-box">

            <p class="connect-box-title">Choisir une plateforme</p>

            <button class="btn-platform" onclick="connectSpotify()">
              <img src="image/spotify.png" alt="Spotify" class="platform-logo" />
              <span class="platform-label">Continuer avec Spotify</span>
            </button>

          </div>

        </div>



      </main>

      <footer class="footer">
        <span>© 2025 MuseStat</span>
      </footer>

    </div>

    <script>
      async function connectSpotify() {
        try {
          const response = await fetch('http://127.0.0.1:8000/spotify/auth');
          const data = await response.json();
          window.location.href = data.auth_url;
        } catch (e) {
          alert('Le serveur n\'est pas disponible. Lance le backend d\'abord.');
        }
      }
    </script>

  </body>
</html>
