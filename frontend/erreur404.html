<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="error404.css" />
  </head>
  <body>
    <div class="line line-v l1"></div>
    <div class="line line-v l2"></div>
    <div class="line line-v l3"></div>
    <div class="line line-v l4"></div>

    <div class="accent a1"></div>
    <div class="accent a2"></div>
    <div class="accent a3"></div>
    <div class="accent a4"></div>

    <div class="container">
      <div class="error-code">404</div>
      <p class="title">Page non trouvée</p>
      <p class="subtitle">
        Oups ! Cette page a quitté votre playlist. Rendez-vous en page d'accueil
        en attendant son comeback <i class="fa-solid fa-music"></i>
      </p>
      <a class="btn-homepage" href="index.html">Page d'accueil</a>
      <div class="socials"></div>
    </div>
  </body>
</html>
